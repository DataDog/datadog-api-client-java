name: Reusable Java Testing Workflow

on:
  workflow_call:
    inputs:
      target-branch:
        description: 'Branch to checkout and test (defaults to the calling branch)'
        required: false
        type: string
        default: ''
      java-versions:
        description: 'JSON array of Java versions to test against'
        required: false
        type: string
        default: '["8", "16", "18", "19"]'
      platforms:
        description: 'JSON array of platforms to run tests on'
        required: false
        type: string
        default: '["ubuntu-latest"]'
      test-script:
        description: 'Test script to execute'
        required: false
        type: string
        default: './run-tests.sh'
    secrets:
      PIPELINE_GITHUB_APP_ID:
        required: false
      PIPELINE_GITHUB_APP_PRIVATE_KEY:
        required: false
      DD_API_KEY:
        required: false

jobs:
  test:
    strategy:
      matrix:
        java-version: ${{ fromJSON(inputs.java-versions) }}
        platform: ${{ fromJSON(inputs.platforms) }}
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          repository: DataDog/datadog-api-client-java
          ref: ${{ inputs.target-branch || github.ref }}
      - name: Install Java
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3.14.1
        with:
          java-version: ${{ matrix.java-version }}
          distribution: "temurin"
          cache: "maven"
      - name: Configure Datadog Test Optimization
        uses: datadog/test-visibility-github-action@f76512a963e7375dab9ad7f1abc0cacd41806c5c # v2.6.0
        with:
          languages: java
          api_key: ${{ secrets.DD_API_KEY }}
      - name: Test
        run: ${{ inputs.test-script }}
        env:
          DD_CIVISIBILITY_COMPILER_PLUGIN_AUTO_CONFIGURATION_ENABLED: "false"